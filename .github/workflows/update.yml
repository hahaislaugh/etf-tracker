name: 每日更新 ETF 持股資料

on:
  schedule:
    # 每天台北時間 23:00 = UTC 15:00（週一到週五）
    - cron: '0 15 * * 1-5'
  workflow_dispatch:  # 允許手動觸發

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安裝依賴套件
        run: pip install openpyxl

      - name: 下載最新持股資料並重建 HTML
        run: python3 update_data.py

      - name: 提交並推送更新（儲存 xlsx 歷史）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 復華/ 群益/
          git diff --cached --quiet || git commit -m "chore: 自動更新持股資料 $(TZ=Asia/Taipei date '+%Y/%m/%d %H:%M')"
          git push

      - name: 上傳 Pages 靜態檔案
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
